name: CI

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli || true

      - name: Build contract
        run: cargo build --release --target wasm32-unknown-unknown
        working-directory: contracts/compliance-oracle

      - name: Run tests
        run: cargo test --release
        working-directory: contracts/compliance-oracle

      - name: Check WASM size
        run: |
          WASM_PATH="target/wasm32-unknown-unknown/release/engram_compliance_oracle.wasm"
          if [ -f "$WASM_PATH" ]; then
            SIZE=$(stat --format=%s "$WASM_PATH" 2>/dev/null || stat -f%z "$WASM_PATH")
            echo "WASM size: $SIZE bytes ($(( SIZE / 1024 )) KB)"
            # Soroban max contract size is 256KB
            if [ "$SIZE" -gt 262144 ]; then
              echo "::error::WASM exceeds 256KB limit ($SIZE bytes)"
              exit 1
            fi
          fi

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit || true

      - name: Run audit
        run: cargo audit
        continue-on-error: true

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check
        working-directory: contracts/compliance-oracle
